name: PR Check

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate PR title
        run: echo "PR #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
      - name: Check diff size
        run: git diff --stat HEAD~1
